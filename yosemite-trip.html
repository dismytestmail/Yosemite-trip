function DayMap(p){

    window.L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18}).addTo(map);

    function os(e){sy.current=e.touches[0].clientY;cy.current=0;if(sr.current)sr.current.style.transition='none';}
    function om(e){if(sy.current===null)return;var dy=e.touches[0].clientY-sy.current;if(dy<=0)return;e.preventDefault();cy.current=dy;if(sr.current)sr.current.style.transform='translateY('+dy+'px)';}
