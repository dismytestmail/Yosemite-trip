<title>Trip Planner</title>

<style>
*{box-sizing:border-box;}
html{touch-action:pan-y;-webkit-text-size-adjust:100%;text-size-adjust:100%;}
html,body{margin:0;padding:0;background:#F5F3EE;font-family:'Inter',-apple-system,sans-serif;}
button,a{touch-action:manipulation;}
input,textarea,select{font-size:16px !important;}
::-webkit-scrollbar{display:none;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
input,textarea{font-family:inherit;outline:none;}
#trip-viewer{display:none;position:fixed;inset:0;z-index:50;flex-direction:column;background:#F5F3EE;}
#trip-viewer.open{display:flex;}
#trip-bar{background:#1C3A2E;color:#fff;padding:max(14px,env(safe-area-inset-top)) 16px 12px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
#trip-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
</style>
<!-- PWA / Home Screen icon -->
<link rel="apple-touch-icon" sizes="180x180" href="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=180&h=180&fit=crop&q=80">

<body>
<div id="hub">
  <div style="background:#1C3A2E;color:#fff;padding:52px 20px 28px;">
    <div style="font-size:11px;font-weight:600;letter-spacing:2px;opacity:0.4;text-transform:uppercase;margin-bottom:10px;">TRIP PLANNER</div>
    <div style="font-size:32px;font-weight:700;letter-spacing:-0.5px;">My Trips</div>
    <div style="font-size:15px;color:#E8B97A;font-weight:500;margin-top:4px;">All your trips in one place</div>
  </div>
  <div style="padding:20px 16px;" id="trip-list"></div>
  <div style="padding:0 16px 60px;">
    <button onclick="addTrip()" style="width:100%;padding:16px;background:#fff;border:2px dashed #C9C4BA;border-radius:12px;color:#888;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add new trip
    </button>
  </div>
</div>
<div id="trip-viewer">
  <div id="trip-bar">
    <button onclick="closeTrip()" style="background:rgba(255,255,255,0.15);border:none;color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span id="trip-bar-title" style="font-size:22px;font-weight:700;letter-spacing:-0.3px;flex:1;"></span>
    <button id="trip-menu-btn" onclick="openTripMenu()" style="display:none;background:rgba(255,255,255,0.15);border:none;color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;flex-shrink:0;align-items:center;justify-content:center;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="5" r="1" fill="currentColor"/><circle cx="12" cy="12" r="1" fill="currentColor"/><circle cx="12" cy="19" r="1" fill="currentColor"/></svg>
    </button>
  </div>
  <div id="trip-menu-sheet" style="display:none;position:fixed;inset:0;z-index:200;align-items:flex-end;">
    <div style="position:absolute;inset:0;background:rgba(0,0,0,0.45);" onclick="closeTripMenu()"></div>
    <div style="position:relative;background:#fff;width:100%;border-radius:20px 20px 0 0;padding:12px 20px 48px;z-index:201;">
      <div style="width:36px;height:4px;border-radius:2px;background:#E8E8E8;margin:0 auto 20px;"></div>
      <div id="trip-menu-title" style="font-size:17px;font-weight:700;color:#1A1A1A;margin-bottom:20px;"></div>
      <button onclick="deleteTripFromMenu()" style="display:inline-block;padding:9px 20px;background:#FDECEA;color:#C0392B;border:1px solid #FBCFCF;border-radius:100px;cursor:pointer;font-family:-apple-system,sans-serif;font-size:13px;font-weight:600;">Delete trip</button>
    </div>
  </div>
  <div id="trip-content"><div id="root"></div></div>
</div>

<!-- Add trip bottom sheet -->
<div id="add-trip-sheet" style="display:none;position:fixed;inset:0;z-index:300;align-items:flex-end;">
  <div style="position:absolute;inset:0;background:rgba(0,0,0,0.45);" onclick="closeAddTrip()"></div>
  <div style="position:relative;background:#fff;width:100%;border-radius:20px 20px 0 0;padding:12px 20px 48px;z-index:301;max-height:80vh;overflow-y:auto;">
    <div style="width:36px;height:4px;border-radius:2px;background:#E8E8E8;margin:0 auto 20px;"></div>
    <div style="font-size:19px;font-weight:700;color:#1A1A1A;margin-bottom:20px;">New trip</div>
    <div style="font-size:12px;font-weight:600;color:#7A7A7A;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.6px;">Trip name</div>
    <input id="add-trip-name" type="text" placeholder="e.g. Paris 2026" onkeydown="if(event.key==='Enter')document.getElementById('add-trip-dates').focus();" style="width:100%;padding:12px 16px;border:1px solid #E8E8E8;border-radius:12px;font-size:16px;background:#F7F7F7;font-family:inherit;box-sizing:border-box;margin-bottom:14px;">
    <div style="font-size:12px;font-weight:600;color:#7A7A7A;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.6px;">Dates</div>
    <input id="add-trip-dates" type="text" placeholder="e.g. Jun 15 – 22, 2026" onkeydown="if(event.key==='Enter')confirmAddTrip();" style="width:100%;padding:12px 16px;border:1px solid #E8E8E8;border-radius:12px;font-size:16px;background:#F7F7F7;font-family:inherit;box-sizing:border-box;margin-bottom:20px;">
    <button onclick="confirmAddTrip()" style="width:100%;padding:15px;background:#1A3C34;color:#fff;border:none;border-radius:100px;cursor:pointer;font-family:inherit;font-size:15px;font-weight:600;">Add trip</button>
  </div>
</div>

function(){\n      if(!df.label.value.trim()){alert(\"Label is required\");return;}\n      if(isED){exDay.label=df.label.value.trim();exDay.date=df.date.value.trim();exDay.color=selColor;}\n      else{state.days.push({id:uid(),label:df.label.value.trim(),date:df.date.value.trim()||\"\",color:selColor,stops:[]});state.activeDay=state.days[state.days.length-1].id;}\n      persist();close();\n    });\n    sheet.appendChild(sdb);\n    if(isED&&state.days.length>1){var ddb=mkPillBtn(\"Delete day\",C.redLt,C.red);ddb.style.border=\"1px solid #FBCFCF\";var _dd=false;ddb.addEventListener(\"click\",function(){if(!_dd){_dd=true;ddb.textContent=\"Confirm?\";ddb.style.background=\"#FDECEA\";setTimeout(function(){_dd=false;ddb.textContent=\"Delete day\";ddb.style.background=\"transparent\";},2500);return;}state.days=state.days.filter(function(d){return d.id!==m.dayId;});state.activeDay=state.days[0].id;persist();close();});sheet.appendChild(ddb);}\n  }\n  overlay.appendChild(sheet);return overlay;\n}\n\n// Auto-geocode a stop by name and persist\nfunction geocodeStop(dayId, stopIdx){\n  var d=state.days.find(function(x){return x.id===dayId;});\n  if(!d||!d.stops[stopIdx])return;\n  var s=d.stops[stopIdx];\n  var query=s.type===\"drive\"?null:(s.label||null);\n  if(!query)return;\n  if(s.lat&&s.lng)return; // already geocoded\n  var url=\"https://nominatim.openstreetmap.org/search?format=json&limit=1&q=\"+encodeURIComponent(query);\n  s._geocoding=true; render(); // show geocoding indicator\n  fetch(url,{headers:{\"Accept-Language\":\"en\",\"User-Agent\":\"TripPlannerApp/1.0\"}})\n    .then(function(r){return r.json();})\n    .then(function(data){\n      s._geocoding=false;\n      if(data&&data[0]){\n        s.lat=\"\"+data[0].lat;\n        s.lng=\"\"+data[0].lon;\n        console.log(\"Geocoded\",query,\"->\",s.lat,s.lng);\n      } else {\n        console.warn(\"No geocode result for:\",query);\n      }\n      persist();render();\n    }).catch(function(err){\n      s._geocoding= ];
function loadCustom(){try{return JSON.parse(localStorage.getItem("tp_trips")||"[]");}catch(e){return[];}}
function saveCustom(a){try{localStorage.setItem("tp_trips",JSON.stringify(a));}catch(e){}}
function getLiveTitle(t){
  try{
    var key=t.stateKey||(t.id==="new-trip"?"nt_state":"nt_state_"+t.id);
    var raw=localStorage.getItem(key);
    if(!raw)return{title:t.title,subtitle:t.subtitle||""};
    var s=JSON.parse(raw);
    return{title:s.tripName||t.title,subtitle:s.subtitle||t.subtitle||""};
  }catch(e){return{title:t.title,subtitle:t.subtitle||""};}
}
function getTripOrder(){try{return JSON.parse(localStorage.getItem("tp_order")||"null");}catch(e){return null;}}
function saveTripOrder(ids){try{localStorage.setItem("tp_order",JSON.stringify(ids));}catch(e){}}
function applyOrder(trips){
  var order=getTripOrder();
  if(!order||!order.length)return trips;
  var map={};trips.forEach(function(t){map[t.id]=t;});
  var ordered=order.map(function(id){return map[id];}).filter(Boolean);
  // Add any new trips not yet in order
  trips.forEach(function(t){if(order.indexOf(t.id)<0)ordered.push(t);});
  return ordered;
}
function render(){
  var list=document.getElementById("trip-list");list.innerHTML="";
  applyOrder(TRIPS.concat(loadCustom())).forEach(function(t,tIdx,tArr){
    var card=document.createElement("div");
    card.style.cssText="background:#fff;border-radius:14px;overflow:hidden;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.06);cursor:pointer;border:1px solid #E4E0D8;";
    card.onclick=function(){openTrip(t);};
    var strip=document.createElement("div");strip.style.cssText="height:5px;background:"+t.color+";";card.appendChild(strip);
    var body=document.createElement("div");body.style.cssText="padding:16px 18px 18px;display:flex;align-items:flex-start;gap:14px;";
    var badge=document.createElement("div");badge.style.cssText="width:48px;height:48px;border-radius:12px;background:"+t.color+";display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;flex-shrink:0;letter-spacing:-1px;";badge.textContent=(t.editable?getLiveTitle(t).title:t.title).split(" ").map(function(w){return w[0]||"";}).join("").slice(0,2).toUpperCase();body.appendChild(badge);
    var txt=document.createElement("div");txt.style.cssText="flex:1;min-width:0;";
    var live=t.editable?getLiveTitle(t):{title:t.title,subtitle:t.subtitle||""};txt.innerHTML="<div style='font-size:17px;font-weight:700;color:#1A1A1A;margin-bottom:3px'>"+live.title+"</div>"+"<div style='font-size:13px;color:#888;margin-bottom:6px'>"+t.dates+"</div>"+(live.subtitle?"<div style='font-size:13px;color:#555'>"+live.subtitle+"</div>":"");
    body.appendChild(txt);
    if(t.editable){var eb=document.createElement("div");eb.style.cssText="font-size:10px;background:#E8F4EC;color:#2D5A44;padding:3px 8px;border-radius:10px;font-weight:600;flex-shrink:0;align-self:flex-start;margin-top:2px;";eb.textContent="EDITABLE";body.appendChild(eb);}
    else{var ar=document.createElement("div");ar.style.cssText="color:#C0BBB2;flex-shrink:0;margin-top:4px;";ar.innerHTML='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>';body.appendChild(ar);}
    card.appendChild(body);
    if(!t.builtin){var del=document.createElement("div");del.style.cssText="padding:0 18px 14px;display:flex;justify-content:flex-end;";var btn=document.createElement("button");btn.textContent="Delete";btn.style.cssText="background:none;border:1px solid #F0C0C0;color:#9B5555;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit;";
    var _delPending=false;
    btn.onclick=function(e){
      e.stopPropagation();
      if(!_delPending){
        _delPending=true;
        btn.textContent="Confirm?";
        btn.style.background="#FDECEA";
        setTimeout(function(){_delPending=false;btn.textContent="Delete";btn.style.background="none";},2500);
      } else {
        deleteTrip(t.id);
      }
    };del.appendChild(btn);card.appendChild(del);}
    // Reorder arrows row
    var reorderRow=document.createElement("div");
    reorderRow.style.cssText="display:flex;gap:6px;padding:0 16px 14px;";
    if(tIdx>0){
      var upBtn=document.createElement("button");
      upBtn.textContent="↑";
      upBtn.style.cssText="flex:1;padding:6px;border:1px solid #E8E8E8;border-radius:8px;background:#fff;cursor:pointer;font-size:14px;color:#555;";
      (function(idx){upBtn.onclick=function(e){e.stopPropagation();
        var all=applyOrder(TRIPS.concat(loadCustom()));
        var ids=all.map(function(x){return x.id;});
        var tmp=ids[idx];ids[idx]=ids[idx-1];ids[idx-1]=tmp;
        saveTripOrder(ids);render();
      };})(tIdx);
      reorderRow.appendChild(upBtn);
    }
    if(tIdx<tArr.length-1){
      var downBtn=document.createElement("button");
      downBtn.textContent="↓";
      downBtn.style.cssText="flex:1;padding:6px;border:1px solid #E8E8E8;border-radius:8px;background:#fff;cursor:pointer;font-size:14px;color:#555;";
      (function(idx){downBtn.onclick=function(e){e.stopPropagation();
        var all=applyOrder(TRIPS.concat(loadCustom()));
        var ids=all.map(function(x){return x.id;});
        var tmp=ids[idx];ids[idx]=ids[idx+1];ids[idx+1]=tmp;
        saveTripOrder(ids);render();
      };})(tIdx);
      reorderRow.appendChild(downBtn);
    }
    if(reorderRow.children.length>0)card.appendChild(reorderRow);
    list.appendChild(card);
  });
}
var _hs=0;

function closeTrip(){
  closeTripMenu();
  document.getElementById("trip-viewer").classList.remove("open");
  document.getElementById("root").innerHTML="";
  document.body.style.overflow="";
  window.scrollTo(0,_hs);
  render(); // refresh card titles from localStorage
}

var _currentTripId=null;
var _currentTripBuiltin=false;

function openTrip(t){
  _hs=window.scrollY||document.documentElement.scrollTop;
  _currentTripId=t.id;
  _currentTripBuiltin=t.builtin||false;
  document.getElementById("trip-bar-title").textContent=t.editable?getLiveTitle(t).title:t.title;
  // Show menu button only for deletable trips
  var menuBtn=document.getElementById("trip-menu-btn");
  if(menuBtn)menuBtn.style.display=_currentTripBuiltin?"none":"flex";
  document.getElementById("trip-viewer").classList.add("open");
  document.body.style.overflow="hidden";
  var r=document.getElementById("root");r.innerHTML="";
  // Set the state key so each trip has isolated localStorage
  window._tripStateKey = t.stateKey || (t.id==="new-trip" ? "nt_state" : "nt_state_"+t.id);
  window._tripTitle = t.editable ? getLiveTitle(t).title : t.title;
  try{(new Function(t.appjs))();}
  catch(e){r.innerHTML="<div style='padding:40px;color:#555;font-family:sans-serif'>Error: "+e.message+"</div>";console.error(e);}
}

function openTripMenu(){
  var sheet=document.getElementById("trip-menu-sheet");
  if(!sheet)return;
  var title=document.getElementById("trip-menu-title");
  var liveTitle=_currentTripId==="new-trip"?getLiveTitle({id:"new-trip",title:"New Trip",editable:true}).title:"Trip";
  if(title)title.textContent=liveTitle;
  sheet.style.display="flex";
}

function closeTripMenu(){
  var sheet=document.getElementById("trip-menu-sheet");
  if(sheet)sheet.style.display="none";
}

function deleteTripFromMenu(){
  if(!_currentTripId)return;
  var liveTitle=document.getElementById("trip-menu-title").textContent||"this trip";
  
  closeTripMenu();
  saveCustom(loadCustom().filter(function(t){return t.id!==_currentTripId;}));
  closeTrip();
}
function addTrip(){
  var sheet=document.getElementById("add-trip-sheet");
  if(sheet){
    document.getElementById("add-trip-name").value="";
    document.getElementById("add-trip-dates").value="";
    sheet.style.display="flex";
    setTimeout(function(){document.getElementById("add-trip-name").focus();},100);
  }
}
function closeAddTrip(){
  var sheet=document.getElementById("add-trip-sheet");
  if(sheet)sheet.style.display="none";
}
function confirmAddTrip(){
  var title=document.getElementById("add-trip-name").value.trim();
  if(!title){document.getElementById("add-trip-name").focus();return;}
  var dates=document.getElementById("add-trip-dates").value.trim();
  closeAddTrip();
  var arr=loadCustom();
  var nid="trip-"+Date.now();
  arr.push({id:nid,title:title,subtitle:"",color:"#4A7C5F",dates:dates,appjs:TRIPS[1].appjs,builtin:false,editable:true,stateKey:"nt_state_"+nid});
  saveCustom(arr);
  var allIds=applyOrder(TRIPS.concat(arr)).map(function(t){return t.id;});
  saveTripOrder(allIds);
  render();
}
function deleteTrip(id){saveCustom(loadCustom().filter(function(t){return t.id!==id;}));render();}
render();
</script>
