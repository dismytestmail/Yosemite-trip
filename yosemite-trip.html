function DayMap(p){
  var day=p.day,ref=React.useRef(null),inst=React.useRef(null);
  var mid=React.useRef('m'+day.id+Math.random().toString(36).slice(2,7));
  React.useEffect(function(){
    if(!window.L)return;
    if(inst.current){inst.current.remove();inst.current=null;}
    var el=document.getElementById(mid.current);
    if(!el)return;
    var map=window.L.map(el,{zoomControl:true,scrollWheelZoom:false});
    inst.current=map;
    window.L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18}).addTo(map);
    var lls=day.pins.map(function(pin){return[pin.lat,pin.lng];});
    if(lls.length>1){map.fitBounds(window.L.latLngBounds(lls),{padding:[30,30]});
      window.L.polyline(lls,{color:day.color,weight:2.5,opacity:.5,dashArray:'6,5'}).addTo(map);}
    else{map.setView(lls[0],day.map.zoom);}
    day.pins.forEach(function(pin,i){
      var bg=i===0?day.color:i===day.pins.length-1?C.forest:'#555';
