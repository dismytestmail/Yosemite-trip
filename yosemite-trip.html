<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Trip Planner</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

<style>
*{box-sizing:border-box;}
html{touch-action:pan-y;-webkit-text-size-adjust:100%;text-size-adjust:100%;}
html,body{margin:0;padding:0;background:#F5F3EE;font-family:'Inter',-apple-system,sans-serif;}
button,a{touch-action:manipulation;}
input,textarea,select{font-size:16px !important;}
::-webkit-scrollbar{display:none;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
input,textarea{font-family:inherit;outline:none;}
#trip-viewer{display:none;position:fixed;inset:0;z-index:50;flex-direction:column;background:#F5F3EE;}
#trip-viewer.open{display:flex;}
#trip-bar{background:#1C3A2E;color:#fff;padding:max(10px,env(safe-area-inset-top)) 16px 8px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
#trip-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
</style>
<!-- PWA / Home Screen icon -->
<link rel="apple-touch-icon" sizes="180x180" href="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=180&h=180&fit=crop&q=80">
<link rel="apple-touch-icon" href="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=180&h=180&fit=crop&q=80">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Trip Planner">
<meta name="mobile-web-app-capable" content="yes">
</head>
<body>
<div id="hub">
  <div style="padding:60px 20px 20px;">
    <div style="font-size:32px;font-weight:700;letter-spacing:-0.5px;color:#1A1A1A;">My Trips</div>
  </div>
  <div style="padding:20px 16px;" id="trip-list"></div>
  <div style="padding:0 16px 40px;">
    <button onclick="addTrip()" style="width:100%;padding:16px;background:transparent;border:2px dashed #C9C4BA;border-radius:12px;color:#888;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add new trip
    </button>
  </div>
</div>
<div id="trip-viewer">
  <div id="trip-bar">
    <button onclick="closeTrip()" style="background:rgba(255,255,255,0.15);border:none;color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div style="flex:1;"></div>
    <button id="trip-menu-btn" onclick="openTripMenu()" style="display:none;background:rgba(255,255,255,0.15);border:none;color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;flex-shrink:0;align-items:center;justify-content:center;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="5" r="1" fill="currentColor"/><circle cx="12" cy="12" r="1" fill="currentColor"/><circle cx="12" cy="19" r="1" fill="currentColor"/></svg>
    </button>
  </div>
  <div id="trip-menu-sheet" style="display:none;position:fixed;inset:0;z-index:200;align-items:flex-end;">
    <div style="position:absolute;inset:0;background:rgba(0,0,0,0.45);" onclick="closeTripMenu()"></div>
    <div style="position:relative;background:#fff;width:100%;border-radius:20px 20px 0 0;padding:12px 20px 48px;z-index:201;">
      <div style="width:36px;height:4px;border-radius:2px;background:#E8E8E8;margin:0 auto 20px;"></div>
      <div id="trip-menu-title" style="font-size:17px;font-weight:700;color:#1A1A1A;margin-bottom:20px;"></div>
      <button onclick="deleteTripFromMenu()" style="display:inline-block;padding:9px 20px;background:#FDECEA;color:#C0392B;border:1px solid #FBCFCF;border-radius:100px;cursor:pointer;font-family:-apple-system,sans-serif;font-size:13px;font-weight:600;">Delete trip</button>
    </div>
  </div>
  <div id="trip-content"><div id="root"></div></div>
</div>

<!-- Add trip bottom sheet -->
<div id="add-trip-sheet" style="display:none;position:fixed;inset:0;z-index:300;align-items:flex-end;">
  <div style="position:absolute;inset:0;background:rgba(0,0,0,0.45);" onclick="closeAddTrip()"></div>
  <div style="position:relative;background:#fff;width:100%;border-radius:20px 20px 0 0;padding:12px 20px 48px;z-index:301;max-height:80vh;overflow-y:auto;">
    <div style="width:36px;height:4px;border-radius:2px;background:#E8E8E8;margin:0 auto 20px;"></div>
    <div style="font-size:19px;font-weight:700;color:#1A1A1A;margin-bottom:20px;">New trip</div>
    <div style="font-size:12px;font-weight:600;color:#7A7A7A;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.6px;">Trip name</div>
    <input id="add-trip-name" type="text" placeholder="e.g. Paris 2026" onkeydown="if(event.key==='Enter')document.getElementById('add-trip-dates').focus();" style="width:100%;padding:12px 16px;border:1px solid #E8E8E8;border-radius:12px;font-size:16px;background:#F7F7F7;font-family:inherit;box-sizing:border-box;margin-bottom:14px;">
    <div style="font-size:12px;font-weight:600;color:#7A7A7A;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.6px;">Dates</div>
    <input id="add-trip-dates" type="text" placeholder="e.g. Jun 15 – 22, 2026" onkeydown="if(event.key==='Enter')confirmAddTrip();" style="width:100%;padding:12px 16px;border:1px solid #E8E8E8;border-radius:12px;font-size:16px;background:#F7F7F7;font-family:inherit;box-sizing:border-box;margin-bottom:20px;">
    <button onclick="confirmAddTrip()" style="width:100%;padding:15px;background:#1A3C34;color:#fff;border:none;border-radius:100px;cursor:pointer;font-family:inherit;font-size:15px;font-weight:600;">Add trip</button>
  </div>
</div>

function loadCustom(){try{return JSON.parse(localStorage.getItem("tp_trips")||"[]");}catch(e){return[];}}
function saveCustom(a){try{localStorage.setItem("tp_trips",JSON.stringify(a));}catch(e){}}
function getLiveTitle(t){
  try{
    var key=t.stateKey||(t.id==="new-trip"?"nt_state":"nt_state_"+t.id);
    var raw=localStorage.getItem(key);
    if(!raw)return{title:t.title,subtitle:t.subtitle||""};
    var s=JSON.parse(raw);
    return{title:s.tripName||t.title,subtitle:s.subtitle||t.subtitle||""};
  }catch(e){return{title:t.title,subtitle:t.subtitle||""};}
}
function getTripOrder(){try{return JSON.parse(localStorage.getItem("tp_order")||"null");}catch(e){return null;}}
function saveTripOrder(ids){try{localStorage.setItem("tp_order",JSON.stringify(ids));}catch(e){}}
function applyOrder(trips){
  var order=getTripOrder();
  if(!order||!order.length)return trips;
  var map={};trips.forEach(function(t){map[t.id]=t;});
  var ordered=order.map(function(id){return map[id];}).filter(Boolean);
  // Add any new trips not yet in order
  trips.forEach(function(t){if(order.indexOf(t.id)<0)ordered.push(t);});
  return ordered;
}
function render(){
  var list=document.getElementById("trip-list");list.innerHTML="";
  applyOrder(TRIPS.concat(loadCustom())).forEach(function(t,tIdx,tArr){
    var card=document.createElement("div");
    card.style.cssText="background:#fff;border-radius:14px;overflow:hidden;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.06);cursor:pointer;border:1px solid #E4E0D8;";
    card.onclick=function(){openTrip(t);};

    // Body row: badge + title/dates + reorder arrows + chevron
    var body=document.createElement("div");
    body.style.cssText="padding:14px 16px 16px;display:flex;align-items:center;gap:12px;";



    // Title + dates
    var txt=document.createElement("div");
    txt.style.cssText="flex:1;min-width:0;";
    var live=t.editable?getLiveTitle(t):{title:t.title,subtitle:t.subtitle||""};
    txt.innerHTML="<div style='font-size:16px;font-weight:700;color:#1A1A1A;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;'>"+live.title+"</div>"
      +"<div style='font-size:12px;color:#999;'>"+t.dates+"</div>";
    body.appendChild(txt);

    // Reorder arrows (↑↓) — right of title, left of chevron
    var arrows=document.createElement("div");
    arrows.style.cssText="display:flex;flex-direction:column;gap:2px;flex-shrink:0;";
    if(tIdx>0){
      var upBtn=document.createElement("button");
      upBtn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="18 15 12 9 6 15"/></svg>';
      upBtn.style.cssText="background:#F5F3EE;border:none;border-radius:6px;width:26px;height:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#888;padding:0;";
      (function(idx){upBtn.onclick=function(e){e.stopPropagation();
        var all=applyOrder(TRIPS.concat(loadCustom()));
        var ids=all.map(function(x){return x.id;});
        var tmp=ids[idx];ids[idx]=ids[idx-1];ids[idx-1]=tmp;
        saveTripOrder(ids);render();
      };})(tIdx);
      arrows.appendChild(upBtn);
    }
    if(tIdx<tArr.length-1){
      var downBtn=document.createElement("button");
      downBtn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>';
      downBtn.style.cssText="background:#F5F3EE;border:none;border-radius:6px;width:26px;height:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#888;padding:0;";

        var all=applyOrder(TRIPS.concat(loadCustom()));
        var ids=all.map(function(x){return x.id;});
        var tmp=ids[idx];ids[idx]=ids[idx+1];ids[idx+1]=tmp;
        saveTripOrder(ids);render();
      };})(tIdx);
      arrows.appendChild(downBtn);

  document.getElementById("root").innerHTML="";
  document.body.style.overflow="";
  window.scrollTo(0,_hs);
  render(); // refresh card titles from localStorage
}

var _currentTripBuiltin=false;

  _hs=window.scrollY||document.documentElement.scrollTop;
  _currentTripId=t.id;
  _currentTripBuiltin=t.builtin||false;
  // Show menu button only for deletable trips
  var menuBtn=document.getElementById("trip-menu-btn");
  if(menuBtn)menuBtn.style.display=_currentTripBuiltin?"none":"flex";
  document.getElementById("trip-viewer").classList.add("open");
  document.body.style.overflow="hidden";
  var r=document.getElementById("root");r.innerHTML="";
  // Set the state key so each trip has isolated localStorage
  window._tripStateKey = t.stateKey || (t.id==="new-trip" ? "nt_state" : "nt_state_"+t.id);
  window._tripTitle = t.editable ? getLiveTitle(t).title : t.title;
  try{(new Function(t.appjs))();}
  catch(e){r.innerHTML="<div style='padding:40px;color:#555;font-family:sans-serif'>Error: "+e.message+"</div>";console.error(e);}
}

function openTripMenu(){
  var sheet=document.getElementById("trip-menu-sheet");
  if(!sheet)return;
  var title=document.getElementById("trip-menu-title");
  var liveTitle=_currentTripId==="new-trip"?getLiveTitle({id:"new-trip",title:"New Trip",editable:true}).title:"Trip";
  if(title)title.textContent=liveTitle;
  sheet.style.display="flex";

  var sheet=document.getElementById("trip-menu-sheet");
  if(sheet)sheet.style.display="none";
}

function deleteTripFromMenu(){
  if(!_currentTripId)return;
  var liveTitle=document.getElementById("trip-menu-title").textContent||"this trip";

function confirmAddTrip(){
  var title=document.getElementById("add-trip-name").value.trim();
  if(!title){document.getElementById("add-trip-name").focus();return;}
  var dates=document.getElementById("add-trip-dates").value.trim();
  closeAddTrip();

var _miniMaps = {};

function parseTripDay1(t) {
  try {
    var js = t.appjs || '';
    var daysIdx = js.indexOf('DAYS = [');
    if (daysIdx < 0) return null;
    var chunk = js.slice(daysIdx, daysIdx + 4000);
    var mapM = chunk.match(/map:\s*\{\s*lat:\s*([\d\.\-]+),\s*lng:\s*([\d\.\-]+),\s*zoom:\s*(\d+)/);
    if (!mapM) return null;
    var center = { lat: parseFloat(mapM[1]), lng: parseFloat(mapM[2]), zoom: parseInt(mapM[3]) };
    var pinsStart = chunk.indexOf('pins: [');
    if (pinsStart < 0) return { center: center, pins: [] };
    var depth = 0, pinsEnd = pinsStart;
    for (var ci = pinsStart; ci < pinsStart + 3000; ci++) {
      if (chunk[ci] === '[') depth++;
      else if (chunk[ci] === ']') { depth--; if (depth === 0) { pinsEnd = ci; break; } }
    }
    var pinsChunk = chunk.slice(pinsStart, pinsEnd + 1);
    var pins = [];
    var pinRe = /\{\s*lat:\s*([\d\.\-]+),\s*lng:\s*([\d\.\-]+),\s*label:\s*'([^']*)'/g;
    var pm;
    while ((pm = pinRe.exec(pinsChunk)) !== null) {
      pins.push({ lat: parseFloat(pm[1]), lng: parseFloat(pm[2]), label: pm[3] });
    }
    return { center: center, pins: pins };
  } catch(e) { return null; }
}

    var bg = i === 0 ? t.color : i === day1.pins.length - 1 ? '#1C3A2E' : '#555';
    var icon = window.L.divIcon({ className: '', iconSize: [18, 18], iconAnchor: [9, 9],
      html: '<div style="width:18px;height:18px;border-radius:50%;background:' + bg + ';border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:white">' + (i + 1) + '</div>'
    });
    window.L.marker([pin.lat, pin.lng], { icon: icon }).addTo(map);
  });

  _miniMaps[t.id] = map;
}


render();
</script>
</body>
